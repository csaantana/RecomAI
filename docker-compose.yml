version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: recomai-qdrant
    ports:
      - "6333:6333"   # REST API  (usada pelo cliente JS)
      - "6334:6334"   # gRPC      (opcional)
    volumes:
      - qdrant_data:/qdrant/storage   # persiste os vetores entre reinicializações
    environment:
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped

volumes:
  qdrant_data:
    name: recomai-qdrant-data
